<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 CTF - PIR Monitor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #121212; color: #0f0; padding: 20px; }
        #log { background: #000; border: 1px solid #0f0; height: 400px; overflow-y: scroll; padding: 10px; margin-top: 20px; }
        .motion { color: #ff0000; font-weight: bold; }
        .status { color: #888; font-style: italic; }
        .header { border-bottom: 2px solid #0f0; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>PIR SENSOR LIVE FEED [LOCAL HOST]</h1>
        <p>Status: <span id="status">Connecting...</span></p>
    </div>

    <div id="log"></div>

    <script>
        // --- CONFIGURATION ---
        const BROKER_IP = "192.168.1.181"; // Your Mosquitto IP
        const PORT = 9001;                 // The WebSocket port
        const TOPIC = "pir/sensor";
        const CLIENT_ID = "web_client_" + Math.random().toString(16).substr(2, 8);

        const client = new Paho.MQTT.Client(BROKER_IP, PORT, CLIENT_ID);

        client.onConnectionLost = (responseObject) => {
            document.getElementById('status').innerText = "Disconnected";
            document.getElementById('status').style.color = "red";
        };

        client.onMessageArrived = (message) => {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            const timestamp = new Date().toLocaleTimeString();
            
            entry.innerHTML = `[${timestamp}] <span class="motion">${message.payloadString}</span>`;
            log.prepend(entry);
        };

        const onConnect = () => {
            document.getElementById('status').innerText = "Connected to Broker";
            document.getElementById('status').style.color = "#0f0";
            client.subscribe(TOPIC);
        };

        client.connect({ onSuccess: onConnect, useSSL: false });
    </script>
</body>
</html>
