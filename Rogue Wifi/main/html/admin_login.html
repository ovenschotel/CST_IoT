<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Courier New', monospace; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #e2e8f0; }
.container { background: #1e293b; padding: 40px; border-radius: 8px; box-shadow: 0 0 40px rgba(0,255,0,0.1); max-width: 400px; width: 90%; border: 1px solid #334155; }
h2 { color: #4ade80; margin-bottom: 20px; text-align: center; font-size: 24px; }
.subtitle { color: #94a3b8; text-align: center; margin-bottom: 30px; font-size: 14px; }
input[type='password'] { width: 100%; padding: 14px; margin-bottom: 20px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 16px; font-family: 'Courier New', monospace; }
input[type='password']:focus { outline: none; border-color: #4ade80; box-shadow: 0 0 0 3px rgba(74,222,128,0.1); }
input[type='submit'] { width: 100%; padding: 14px; background: #4ade80; color: #0f172a; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; font-family: 'Courier New', monospace; }
input[type='submit']:hover { background: #22c55e; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(74,222,128,0.4); }
.error { background: #7f1d1d; color: #fca5a5; padding: 12px; border-radius: 6px; margin-bottom: 20px; text-align: center; border-left: 4px solid #dc2626; }
</style>
</head>
<body>
<div class='container'>
<h2>ADMIN ACCESS</h2>
<p class='subtitle'>Enter PIN to continue</p>
<form method='POST' action='/admin-auth'>
<input type='password' name='pin' placeholder='Enter PIN' maxlength='4' inputmode='numeric' pattern='[0-9]*' required autofocus>
<input type='submit' value='AUTHENTICATE'>
</form>
</div>
</body>
</html>
