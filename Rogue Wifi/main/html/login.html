<!DOCTYPE html>
<html>
<head>
<title>Sign In</title>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<meta name='apple-mobile-web-app-capable' content='yes'>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #0056b3; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { background: #fff; padding: 40px 35px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 380px; width: 90%; }
.logo-container { text-align: center; margin-bottom: 25px; }
.logo-container img { max-width: 200px; height: auto; }
h2 { color: #0056b3; margin-bottom: 10px; font-size: 26px; font-weight: 700; text-align: center; }
.subtitle { color: #666; font-size: 14px; margin-bottom: 30px; text-align: center; }
input[type='text'], input[type='password'] { width: 100%; padding: 14px 16px; margin-bottom: 16px; border: 2px solid #e1e1e1; border-radius: 8px; font-size: 15px; transition: all 0.3s; outline: none; }
input[type='text']:focus, input[type='password']:focus { border-color: #0056b3; box-shadow: 0 0 0 3px rgba(0,86,179,0.15); }
input[type='submit'] { width: 100%; padding: 14px; background: #0056b3; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
input[type='submit']:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,86,179,0.4); }
input[type='submit']:active { transform: translateY(0); }
</style>
</head>
<body>
<div class='container'>
<div class='logo-container'>
<img src='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="%230056b3" stroke-width="2"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>' alt='Logo'>
</div>
<h2>Sign In</h2>
<p class='subtitle'>Please sign in to continue</p>
<form action='/login' method='POST'>
<input type='hidden' name='time' id='local_time' value=''>
<input type='text' name='email' placeholder='Email or Username' required autocomplete='email'>
<input type='password' name='password' placeholder='Password' required autocomplete='current-password'>
<input type='submit' value='Sign In'>
</form>
</div><script>
  document.getElementById('local_time').value = new Date().toLocaleString();
</script></body>
</html>
